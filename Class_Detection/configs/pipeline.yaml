# ── Global Pipeline Configuration ─────────────────────────────
# All thresholds, window parameters, and scoring weights.

# ── Detection ─────────────────────────────────────────────────
detection:
  # The dual-model architecture:
  # behavior_model detects 7 student states (write, read, lookup, turn_head, raise_hand, stand, discuss)
  # env_model detects environment anchors (screen_board) from the legacy 3-class model
  behavior_model: yolo26m.pt  # Placeholder for SCB-Dataset trained weights
  env_model: artifacts/runs/detect/scb5_yolo26m_e40/weights/best.pt
  conf_threshold: 0.25
  iou_threshold: 0.7
  imgsz: 960
  device: "0"

# ── Tracking ──────────────────────────────────────────────────
tracking:
  tracker: configs/bytetrack_low.yaml
  persist: true
  track_buffer: 60        # frames to keep lost tracks

# ── Pose estimation ──────────────────────────────────────────
pose:
  model: yolo26n-pose.pt
  conf_threshold: 0.3
  min_face_kpt_conf: 0.4  # minimum confidence for PnP-eligible face keypoints

# ── Action classification ────────────────────────────────────
action:
  window_size: 30          # number of frames for ST-GCN input
  use_stgcn: false         # set true after ST-GCN training
  stgcn_weights: null      # path to trained ST-GCN weights

  # Detection-level action → S_action mapping (SCB-Dataset 7-class system).
  # YOLO directly outputs accurate behavior states.
  action_scores:
    write: 0.85
    read: 0.80
    lookup: 0.85      # normal listening focus
    turn_head: 0.30   # distracted/wandering
    raise_hand: 0.95  # highly active
    stand: 0.90
    discuss: 0.75
    # env model outputs
    teacher: 0.0
    screen_board: 0.0


# ── Gaze estimation ─────────────────────────────────────────
gaze:
  # PnP focus score thresholds
  focus_zones:
    board_focus:            # looking at board/screen
      pitch_range: [-15, 15]
      yaw_range: [-20, 20]
      score: 0.90
    desk_focus:             # looking down at desk
      pitch_range: [-50, -15]
      yaw_range: [-15, 15]
      score: 0.65
    wandering:              # looking around
      score: 0.20
  fallback_base_score: 0.55

# ── VSAM (Visual-Semantic Alignment) ────────────────────────
vsam:
  mu: 3.0                 # prior delay (seconds)
  sigma: 1.5              # Gaussian window width (seconds)
  window_duration: 12.0   # total observation window after t_ocr (seconds)
  ocr_interval_frames: 30 # run OCR every N frames
  text_change_threshold: 0.3  # Levenshtein ratio for knowledge-point switch

# ── Scoring ──────────────────────────────────────────────────
scoring:
  w_action: 0.75          # CAS action weight (student behavior dominant)
  w_gaze: 0.25            # CAS gaze weight (noisy in side-view classroom shots)
  lambda_penalty: 0.6     # CTES variance penalty coefficient

# ── Class role groups (SCB-Dataset 7-class + Env Model) ──────
# Students from behavior_model (0-6)
student_class_ids: [0, 1, 2, 3, 4, 5, 6]
# Teachers from env_model (1)
teacher_class_ids: [1]
# Env from env_model (2)
environment_class_ids: [2]
