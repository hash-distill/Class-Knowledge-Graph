# SCB-5 Unified 13-Class YOLO Detection Config
# Built from 9 original SCB-5 subsets with per-subset ID remapping.
# Source: https://github.com/Whiffe/SCB-dataset
#
# Build command:
#   cd Class_Detection && python tools/build_scb5_unified.py

path: ../SCB5_yolo_unified
train: images/train
val: images/val

names:
  0: hand_raising
  1: read
  2: write
  3: discuss
  4: talk
  5: answer
  6: stage_interact
  7: stand
  8: teacher
  9: guide
  10: board_writing
  11: blackboard
  12: screen
