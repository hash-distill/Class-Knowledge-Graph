# Custom ByteTrack config optimized for low-confidence detections and interval sampling
tracker_type: bytetrack

# Lowered thresholds to ensure more students are tracked even if model confidence is low (e.g. 0.3-0.5)
track_high_thresh: 0.25   # Default is 0.5
track_low_thresh: 0.1     # Default is 0.1
new_track_thresh: 0.25    # Default is 0.6. Detections > this threshold will initialize new tracks.

track_buffer: 60          # Increased to tolerate longer time jumps if --interval-sec > 0
match_thresh: 0.8         # Default 0.8
